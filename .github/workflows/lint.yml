name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Checkout the repository
      - uses: actions/setup-node@v4 # Setup Node.js 22
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run ESLint
        run: npm run lint