services:
  tg-frontend:
    container_name: tg-frontend
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./Dockerfile
#      args:
#        REACT_APP_API_ADDR_ARG: "${REACT_APP_API_ADDR}"
    ports:
      - "${FRONTEND_PORT}:443"
    volumes:
      - ${CERTIFICATE_PATH}:/etc/nginx/cert.crt:ro
      - ${PRIVATE_KEY_PATH}:/etc/nginx/cert.key:ro
#      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend_network


networks:
  backend_network:
  frontend_network:
